<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#f7f4ee"/>
  <text x="700" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#2b2b2b">Esquema possivel para T1</text>
  <text x="700" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#555">Cozinha / WC / lavandaria concentrados na sala esquerda, perto das canalizacoes existentes</text>

  <g transform="translate(90 130)">
    <path d="M0 75 L0 590 L520 590 L520 0 L140 0 L140 75 Z" fill="#fffdf8" stroke="#333" stroke-width="4"/>
    <text x="260" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#333">SALA ESQUERDA</text>
    <text x="260" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">zona social + bloco tecnico</text>

    <rect x="24" y="100" width="255" height="110" fill="#f4c86a" stroke="#9b6b00" stroke-width="2"/>
    <text x="152" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#332600">Cozinha</text>
    <text x="152" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5b4300">na parede da cozinha existente</text>

    <rect x="24" y="220" width="155" height="170" fill="#d9edf7" stroke="#4b8dad" stroke-width="2"/>
    <text x="102" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#123b4d">WC</text>
    <text x="102" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22566d">duche + sanita</text>
    <text x="102" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22566d">perto do esgoto</text>

    <rect x="188" y="220" width="91" height="170" fill="#e6e0d5" stroke="#8a7b67" stroke-width="2"/>
    <text x="234" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3d352a">Lav.</text>
    <text x="234" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#554b3f">armario</text>

    <rect x="300" y="110" width="190" height="420" fill="#f1efe8" stroke="#b0a68e" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="395" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3d3d3d">Sala</text>
    <text x="395" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">estar + jantar</text>
    <text x="395" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">aproveitar luz</text>

    <path d="M215 590 A60 60 0 0 1 335 590" fill="none" stroke="#333" stroke-width="3"/>
    <text x="275" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">entrada / passagem</text>

    <path d="M145 0 L145 75" stroke="#333" stroke-width="4"/>
    <text x="225" y="-16" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">rebaixo / recuo aprox. 1 m</text>

    <line x1="24" y1="90" x2="279" y2="90" stroke="#d85c2a" stroke-width="5"/>
    <text x="152" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#b54317">parede tecnica / porta de madeira</text>
  </g>

  <g transform="translate(690 130)">
    <path d="M0 0 L505 0 L560 65 L560 250 L520 250 L520 590 L0 590 Z" fill="#fffdf8" stroke="#333" stroke-width="4"/>
    <text x="280" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#333">SALA DIREITA</text>
    <text x="280" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">quarto mais reservado</text>

    <rect x="55" y="120" width="250" height="185" rx="4" fill="#cfe5cf" stroke="#5d8c5d" stroke-width="2"/>
    <text x="180" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#244b24">Cama</text>
    <text x="180" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#456b45">quarto</text>

    <rect x="360" y="105" width="72" height="365" fill="#e7d7be" stroke="#8a6c42" stroke-width="2"/>
    <text x="396" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#4d3821" transform="rotate(-90 396 265)">Roupeiro</text>

    <rect x="55" y="360" width="250" height="80" fill="#ece9e2" stroke="#aaa08d" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="180" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#444">zona livre</text>
    <text x="180" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">secretaria / comoda</text>

    <path d="M215 590 A60 60 0 0 1 335 590" fill="none" stroke="#333" stroke-width="3"/>
    <text x="275" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">entrada do quarto</text>
  </g>

  <line x1="640" y1="130" x2="640" y2="720" stroke="#333" stroke-width="5"/>
  <text x="640" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#555">parede/divisao existente entre salas</text>

  <g transform="translate(90 735)">
    <rect x="0" y="0" width="1210" height="55" fill="#ffffff" stroke="#cfc8ba"/>
    <circle cx="28" cy="27" r="9" fill="#f4c86a" stroke="#9b6b00"/>
    <text x="48" y="32" font-family="Arial, sans-serif" font-size="14" fill="#444">cozinha</text>
    <circle cx="145" cy="27" r="9" fill="#d9edf7" stroke="#4b8dad"/>
    <text x="165" y="32" font-family="Arial, sans-serif" font-size="14" fill="#444">casa de banho</text>
    <circle cx="310" cy="27" r="9" fill="#e6e0d5" stroke="#8a7b67"/>
    <text x="330" y="32" font-family="Arial, sans-serif" font-size="14" fill="#444">lavandaria em armario</text>
    <circle cx="530" cy="27" r="9" fill="#cfe5cf" stroke="#5d8c5d"/>
    <text x="550" y="32" font-family="Arial, sans-serif" font-size="14" fill="#444">quarto</text>
    <text x="780" y="32" font-family="Arial, sans-serif" font-size="14" fill="#444">Nota: medidas e posicoes finais dependem de esgotos, janelas e estrutura.</text>
  </g>
