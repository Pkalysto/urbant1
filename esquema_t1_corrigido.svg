<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <rect width="1500" height="900" fill="#f7f4ee"/>
  <text x="750" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#2b2b2b">Esquema T1 corrigido</text>
  <text x="750" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#555">Com base nas tuas notas: agua/esgoto na sala esquerda, entrada com +/- 80 cm e zona comum/quadro na sala direita</text>

  <!-- Sala esquerda -->
  <g transform="translate(90 125)">
    <path d="M0 0 L585 0 L585 635 L0 635 Z" fill="#fffdf8" stroke="#333" stroke-width="4"/>
    <text x="292" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#333">SALA ESQUERDA</text>
    <text x="292" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">cozinha + sala + WC + lavandaria</text>

    <!-- Notas parede/agua -->
    <line x1="18" y1="0" x2="210" y2="0" stroke="#1296db" stroke-width="7"/>
    <text x="115" y="-13" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1296db">agua</text>
    <line x1="0" y1="565" x2="120" y2="565" stroke="#1296db" stroke-width="8"/>
    <text x="92" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1296db">agua + esgoto</text>

    <line x1="0" y1="0" x2="0" y2="635" stroke="#333" stroke-width="6"/>
    <text x="-48" y="250" text-anchor="middle" transform="rotate(-90 -48 250)" font-family="Arial, sans-serif" font-size="14" fill="#555">parede direita</text>
    <rect x="-10" y="95" width="20" height="145" fill="#d8c6aa" stroke="#81552c" stroke-width="2"/>
    <line x1="-18" y1="86" x2="18" y2="250" stroke="#c92929" stroke-width="5"/>
    <text x="-68" y="175" text-anchor="middle" transform="rotate(-90 -68 175)" font-family="Arial, sans-serif" font-size="13" fill="#c92929">porta madeira fechada</text>

    <!-- Porta entrada -->
    <path d="M310 635 A70 70 0 0 1 450 635" fill="none" stroke="#333" stroke-width="3"/>
    <text x="480" y="610" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#c92929">porta entrada</text>
    <text x="480" y="632" font-family="Arial, sans-serif" font-size="14" fill="#c92929">+/- 80 cm</text>

    <!-- Cozinha em L -->
    <rect x="32" y="92" width="320" height="92" fill="#f4c86a" stroke="#9b6b00" stroke-width="2"/>
    <rect x="32" y="184" width="92" height="155" fill="#f4c86a" stroke="#9b6b00" stroke-width="2"/>
    <text x="190" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#332600">Cozinha</text>
    <text x="190" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5b4300">aproveita ponto de agua</text>

    <!-- WC perto do esgoto baixo -->
    <rect x="32" y="360" width="175" height="185" fill="#d9edf7" stroke="#4b8dad" stroke-width="2"/>
    <text x="120" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#123b4d">WC</text>
    <text x="120" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22566d">junto ao esgoto</text>
    <text x="120" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22566d">duche + sanita</text>

    <!-- Lavandaria -->
    <rect x="220" y="360" width="105" height="185" fill="#e6e0d5" stroke="#8a7b67" stroke-width="2"/>
    <text x="273" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3d352a">Lav.</text>
    <text x="273" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#554b3f">armario</text>
    <text x="273" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#554b3f">maquina</text>

    <!-- Sala -->
    <rect x="365" y="115" width="185" height="430" fill="#f1efe8" stroke="#b0a68e" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="458" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#3d3d3d">Sala</text>
    <text x="458" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">estar + jantar</text>
    <text x="458" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">zona livre</text>

    <line x1="345" y1="0" x2="475" y2="0" stroke="#1296db" stroke-width="8"/>
    <text x="410" y="-18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1296db">sacada na parede em frente / luz</text>
  </g>

  <!-- Parede divisoria -->
  <line x1="720" y1="125" x2="720" y2="760" stroke="#333" stroke-width="5"/>
  <text x="720" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">divisao entre salas</text>

  <!-- Sala direita -->
  <g transform="translate(780 125)">
    <path d="M0 0 L560 0 L615 75 L615 270 L570 270 L570 635 L0 635 Z" fill="#fffdf8" stroke="#333" stroke-width="4"/>
    <text x="300" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#333">SALA DIREITA</text>
    <text x="300" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#666">quarto privado, respeitando a zona comum</text>

    <!-- Zona comum -->
    <rect x="0" y="135" width="615" height="58" fill="#ffe8e8" stroke="#d22" stroke-width="2" stroke-dasharray="9 8"/>
    <text x="307" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#c92929">parte comum / passagem tecnica</text>
    <text x="307" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#c92929">manter acesso ao quadro eletrico geral</text>

    <!-- Porta acesso -->
    <rect x="460" y="95" width="78" height="150" fill="#ead7b8" stroke="#8a6c42" stroke-width="2"/>
    <text x="499" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#c92929">porta de acesso</text>
    <text x="499" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5a4428" transform="rotate(-90 499 175)">acesso</text>

    <!-- Quarto -->
    <rect x="70" y="230" width="285" height="205" rx="4" fill="#cfe5cf" stroke="#5d8c5d" stroke-width="2"/>
    <text x="213" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#244b24">Cama</text>
    <text x="213" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#456b45">zona de dormir</text>

    <rect x="385" y="270" width="78" height="250" fill="#e7d7be" stroke="#8a6c42" stroke-width="2"/>
    <text x="424" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#4d3821" transform="rotate(-90 424 395)">Roupeiro</text>

    <line x1="615" y1="340" x2="615" y2="500" stroke="#1296db" stroke-width="8"/>
    <text x="642" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1296db" transform="rotate(90 642 420)">porta sacada</text>

    <rect x="70" y="485" width="285" height="82" fill="#ece9e2" stroke="#aaa08d" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="213" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#444">zona livre</text>
    <text x="213" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">secretaria / comoda</text>

    <path d="M250 635 A65 65 0 0 1 380 635" fill="none" stroke="#333" stroke-width="3"/>
  </g>

  <!-- Legenda -->
  <g transform="translate(90 805)">
    <rect x="0" y="0" width="1320" height="58" fill="#fff" stroke="#cfc8ba"/>
    <circle cx="28" cy="29" r="10" fill="#f4c86a" stroke="#9b6b00"/>
    <text x="50" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">cozinha</text>
    <circle cx="150" cy="29" r="10" fill="#d9edf7" stroke="#4b8dad"/>
    <text x="172" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">WC</text>
    <circle cx="245" cy="29" r="10" fill="#e6e0d5" stroke="#8a7b67"/>
    <text x="267" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">lavandaria</text>
    <circle cx="400" cy="29" r="10" fill="#cfe5cf" stroke="#5d8c5d"/>
    <text x="422" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">quarto</text>
    <rect x="540" y="19" width="34" height="20" fill="#ffe8e8" stroke="#d22" stroke-dasharray="5 4"/>
    <text x="585" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">zona comum / acesso tecnico</text>
    <text x="900" y="34" font-family="Arial, sans-serif" font-size="14" fill="#444">Nota: validar sempre esgotos, ventilacao do WC e eletricidade.</text>
  </g>
</svg>
